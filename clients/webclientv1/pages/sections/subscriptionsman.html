<div class="section-container">
  <div class="section-content">
    <div class="section-header">
      <h2>Manage Subscriptions</h2>
    </div>
    
    <div id="subscriptions-manager-view" class="section-view">
      <!-- Filter Bar -->
      <div class="subscriptions-manager-filter-bar">
        <div class="filter-group">
          <label for="subscriptions-manager-status-filter">Status:</label>
          <select id="subscriptions-manager-status-filter" class="form-control">
            <!-- Generated by JavaScript -->
          </select>
        </div>
        
        <div class="filter-group">
          <label for="subscriptions-manager-search-input">Search:</label>
          <input 
            type="text" 
            id="subscriptions-manager-search-input" 
            class="form-control" 
            placeholder="Search by customer or plan..."
          />
        </div>
        
        <button id="subscriptions-manager-refresh-btn" class="btn btn-primary">Refresh</button>
      </div>
      
      <!-- Subscriptions Table Container -->
      <div id="subscriptions-manager-container" class="subscriptions-table-container">
        <!-- Generated by JavaScript -->
      </div>
      
      <!-- Pagination Controls -->
      <div id="subscriptions-manager-pagination" class="pagination-controls">
        <!-- Generated by JavaScript -->
      </div>
    </div>
    
    <!-- Subscription Detail Modal -->
    <div id="subscriptions-manager-detail-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="subscriptions-manager-detail-title">Subscription Details</h3>
          <button id="subscriptions-manager-detail-close-btn" class="btn-close" type="button">&times;</button>
        </div>
        <div class="modal-body">
          <div id="subscriptions-manager-detail-content">
            <!-- Generated by JavaScript -->
          </div>
        </div>
        <div class="modal-footer">
          <div id="subscriptions-manager-detail-actions">
            <!-- Generated by JavaScript -->
          </div>
          <button id="subscriptions-manager-detail-close-footer-btn" class="btn btn-secondary">Close</button>
        </div>
      </div>
    </div>

  </div>
</div>
