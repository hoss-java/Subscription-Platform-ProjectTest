<div class="section-container">
  <div class="section-content">
    <div class="section-header">
      <h2>Available Plans</h2>
    </div>
    
    <div id="plans-view" class="section-view">
      <!-- Filter and Search Bar -->
      <div class="plans-filter-bar">
        <div class="filter-group">
          <label for="plans-service-type-filter">Service Type:</label>
          <select id="plans-service-type-filter" class="form-control">
            <!-- Generated by JavaScript -->
          </select>
        </div>
        
        <div class="filter-group">
          <label for="plans-search-input">Search Plans:</label>
          <input 
            type="text" 
            id="plans-search-input" 
            class="form-control" 
            placeholder="Search by plan name..."
          />
        </div>
        
        <button id="plans-refresh-btn" class="btn btn-primary">Refresh</button>
      </div>
      
      <!-- Plans Grid Container -->
      <div id="plans-container" class="plans-grid-container">
        <!-- Generated by JavaScript -->
      </div>
      
      <!-- Pagination Controls -->
      <div id="plans-pagination" class="pagination-controls">
        <!-- Generated by JavaScript -->
      </div>
    </div>
    
    <!-- Plan Detail Modal -->
    <div id="plans-detail-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="plans-detail-title">Plan Details</h3>
          <button id="plans-detail-close-btn" class="btn-close" type="button">&times;</button>
        </div>
        <div class="modal-body">
          <div id="plans-detail-content">
            <!-- Generated by JavaScript -->
          </div>
        </div>
        <div class="modal-footer">
          <button id="plans-detail-subscribe-btn" class="btn btn-primary">Subscribe Now</button>
          <button id="plans-detail-close-footer-btn" class="btn btn-secondary">Close</button>
        </div>
      </div>
    </div>

  </div>
</div>
