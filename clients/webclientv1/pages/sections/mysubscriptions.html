<div class="section-container">
  <div class="section-content">
    <div class="section-header">
      <h2>My Subscriptions</h2>
    </div>
    
    <div id="mysubscriptions-view" class="section-view">
      <!-- Filter and Search Bar -->
      <div class="plans-filter-bar">
        <div class="filter-group">
          <label for="mysubscriptions-service-type-filter">Service Type:</label>
          <select id="mysubscriptions-service-type-filter" class="form-control">
            <!-- Generated by JavaScript -->
          </select>
        </div>
        
        <div class="filter-group">
          <label for="mysubscriptions-search-input">Search Subscriptions:</label>
          <input 
            type="text" 
            id="mysubscriptions-search-input" 
            class="form-control" 
            placeholder="Search by plan name..."
          />
        </div>
        
        <button id="mysubscriptions-refresh-btn" class="btn btn-primary">Refresh</button>
      </div>
      
      <!-- Subscriptions Grid Container -->
      <div id="mysubscriptions-container" class="plans-grid-container">
        <!-- Generated by JavaScript -->
      </div>
      
      <!-- Pagination Controls -->
      <div id="mysubscriptions-pagination" class="pagination-controls">
        <!-- Generated by JavaScript -->
      </div>
    </div>
    
    <!-- Subscription Detail Modal -->
    <div id="mysubscriptions-detail-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="mysubscriptions-detail-title">Subscription Details</h3>
          <button id="mysubscriptions-detail-close-btn" class="btn-close" type="button">&times;</button>
        </div>
        <div class="modal-body">
          <div id="mysubscriptions-detail-content">
            <!-- Generated by JavaScript -->
          </div>
          
          <!-- Bills Section -->
          <div id="mysubscriptions-bills-section" class="bills-section">
            <h4>Unpaid Bills</h4>
            <div id="mysubscriptions-bills-list">
              <!-- Generated by JavaScript -->
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="mysubscriptions-detail-close-footer-btn" class="btn btn-secondary">Close</button>
        </div>
      </div>
    </div>

  </div>
</div>
