<div class="auth-container">
  <div class="auth-card">
    <h2>Register</h2>
    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="Enter your first name" required>
        <span class="auth-error" id="firstName-error"></span>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Enter your last name" required>
        <span class="auth-error" id="lastName-error"></span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        <span class="auth-error" id="email-error"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password (min 6 characters)" required>
        <span class="auth-error" id="password-error"></span>
      </div>

      <div class="form-group">
        <label for="passwordConfirm">Confirm Password</label>
        <input type="password" id="passwordConfirm" placeholder="Confirm your password" required>
        <span class="auth-error" id="passwordConfirm-error"></span>
      </div>

      <button type="submit" class="btn-primary">Register</button>
      <span class="auth-error" id="form-error"></span>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="#login">Login here</a>
    </div>
  </div>
</div>
