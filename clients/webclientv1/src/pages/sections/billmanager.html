<div class="section-container">
  <div class="section-content">
    <div class="section-header">
      <h2>Bill Manager</h2>
    </div>

    <div id="billmanager-view" class="section-view">
      <!-- Filters and Search -->
      <div class="section-filters">
        <div class="filter-group">
          <label for="billmanager-status-filter">Filter by Status:</label>
          <select id="billmanager-status-filter" class="filter-select">
            <option value="">All Statuses</option>
          </select>
        </div>
      </div>

      <!-- Bills Table Container -->
      <div id="billmanager-container" class="section-card">
        <!-- Generated by JavaScript -->
      </div>

      <!-- Pagination Container -->
      <div id="billmanager-pagination" class="section-pagination">
        <!-- Generated by JavaScript -->
      </div>

      <!-- Section Actions -->
      <div class="section-actions">
        <button id="billmanager-refresh-btn" class="btn btn-primary">Refresh Bills</button>
      </div>
    </div>

    <!-- Bill Detail Modal Container -->
    <div id="billmanager-detail-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="billmanager-detail-title">Bill Details</h3>
          <button id="billmanager-detail-close-btn" class="modal-close">&times;</button>
        </div>

        <div id="billmanager-detail-content" class="modal-body">
          <!-- Generated by JavaScript -->
        </div>

        <div class="modal-footer">
          <button id="billmanager-detail-close-footer-btn" class="btn btn-secondary">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>
