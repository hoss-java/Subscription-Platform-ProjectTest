<div class="dashboard-wrapper">
  <!-- Sidebar Navigation -->
  <aside class="dashboard-sidebar">
    <div class="sidebar-header">
      <h3>Dashboard</h3>
    </div>
    
    <nav class="sidebar-nav">
      <ul id="sidebar-menu" class="sidebar-menu">
        <!-- Sections will be dynamically loaded here -->
      </ul>
    </nav>
    
    <div class="sidebar-footer">
      <button id="sidebar-logout-btn" class="btn btn-secondary btn-block">
        Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h2 id="section-title">Dashboard</h2>
      <div class="dashboard-user-info">
        <span id="dashboard-user-email">Loading...</span>
      </div>
    </div>

    <!-- Section Container - sections load here -->
    <div id="section-container" class="section-container">
      <div class="section-loading">
        <p>Loading section...</p>
      </div>
    </div>
  </main>
</div>
