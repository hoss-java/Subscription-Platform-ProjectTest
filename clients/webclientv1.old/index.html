<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="container">
                <div class="navbar-brand">
                    <h1>Subscription Platform</h1>
                </div>
                <div class="navbar-menu">
                    <ul id="navLinks">
                        <li><a href="./index.html">Home</a></li>
                        <li id="authLink"><a href="./pages/login.html">Login</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container main-content">
            <section id="authSection" class="auth-section">
                <div class="welcome-box">
                    <h2>Welcome to Subscription Platform</h2>
                    <p>Manage your subscriptions easily</p>
                    <div class="auth-buttons">
                        <a href="./pages/login.html" class="btn btn-primary">Login</a>
                        <a href="./pages/register.html" class="btn btn-secondary">Register</a>
                    </div>
                </div>
            </section>

            <section id="dashboardSection" class="dashboard-section" style="display: none;">
                <div class="dashboard-header">
                    <h2>Dashboard</h2>
                    <button id="logoutBtn" class="btn btn-danger">Logout</button>
                </div>
                <div class="user-info">
                    <p><strong>Welcome, <span id="userName">User</span>!</strong></p>
                    <p>Email: <span id="userEmail">-</span></p>
                    <p>Role: <span id="userRole">-</span></p>
                </div>
            </section>

            <div id="message" class="message"></div>
        </main>
    </div>
    <!-- Scripts -->
    <!-- Managers -->
    <script src="js/console.js"></script>
    <script src="js/console-logger.js"></script>

    <script src="js/config.js"></script>
    <script src="js/utils/apiClient.js"></script>
    <script src="js/services/authService.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
