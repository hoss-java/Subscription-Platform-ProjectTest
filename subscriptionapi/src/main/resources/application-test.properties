spring.application.name=subscriptionapi
server.port=8080
server.address=0.0.0.0

# H2 Database (in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database=H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Logging
#logging.level.root=ERROR
#logging.level.com.subscriptionapi=ERROR
# Enhanced Logging for Debugging
logging.level.root=INFO
logging.level.com.subscriptionapi=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter=DEBUG


# JWT Configuration
jwt.secret=your-secret-key-min-256-bits-long-for-hs256-algorithm-security
jwt.expiration=3600000
jwt.refresh.expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:3280, http://172.32.0.11:8080,http://172.32.0.15:8080
spring.main.allow-circular-references=true

# ADMIN user settings
admin.email=admin@example.com
admin.password=Admin123!
admin.firstName=System
admin.lastName=Admin

# CUSTOMER user settings (test/dev only)
customer.email=customer@example.com
customer.password=Customer123!
customer.firstName=Test
customer.lastName=Customer

