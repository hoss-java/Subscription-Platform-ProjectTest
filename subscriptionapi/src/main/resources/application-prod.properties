# Application Name
spring.application.name=subscriptionapi

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://172.32.0.16:3306/subscriptionapi
spring.datasource.username=subscriptionapi
spring.datasource.password=subscriptionapipass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.root=WARN
logging.level.com.subscriptionapi=INFO

# ADMIN user settings
admin.email=admin@example.com
admin.password=Admin123!
admin.firstName=System
admin.lastName=Admin
